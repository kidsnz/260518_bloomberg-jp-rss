name: Update Bloomberg JP RSS Feed

on:
  schedule:
    # Every 30 minutes
    - cron: "*/30 * * * *"
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write

# Serialize runs so two scheduled invocations can't race on git push.
concurrency:
  group: update-feed
  cancel-in-progress: false

jobs:
  update-feed:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Run feed builder
        run: python fetch_and_build.py

      - name: Check if feed.xml changed
        id: diff
        run: |
          git diff --quiet feed.xml && echo "changed=false" >> $GITHUB_OUTPUT || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push if changed
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add feed.xml
          git commit -m "chore: update feed.xml [$(date -u '+%Y-%m-%d %H:%M UTC')]"
          # Retry with rebase in case another run pushed first (fetch-first reject).
          for i in 1 2 3; do
            git push && break
            echo "push rejected, retrying ($i)..."
            git pull --rebase --autostash
          done
